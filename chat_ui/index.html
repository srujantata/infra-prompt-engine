<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevOps Platform Assistant</title>
  <meta name="theme-color" content="#0d1117" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DevOps AI" />

  <!-- Inline PWA manifest -->
  <link rel="manifest" href="data:application/json,%7B%22name%22%3A%22DevOps%20Platform%20Assistant%22%2C%22short_name%22%3A%22DevOps%20AI%22%2C%22start_url%22%3A%22.%2Findex.html%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%220d1117%22%2C%22theme_color%22%3A%220d1117%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%253Csvg%2520xmlns%253D%2527http%253A%252F%252Fwww.w3.org%252F2000%252Fsvg%2527%2520viewBox%253D%25270%25200%252096%252096%2527%253E%253Crect%2520width%253D%252796%2527%2520height%253D%252796%2527%2520rx%253D%252718%2527%2520fill%253D%2527%2523238636%2527%252F%253E%253Ctext%2520x%253D%252748%2527%2520y%253D%252768%2527%2520font-size%253D%252760%2527%2520text-anchor%253D%2527middle%2527%253E%25F0%259F%25A4%2596%253C%252Ftext%253E%253C%252Fsvg%253E%22%2C%22sizes%22%3A%2296x96%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D" />

  <style>
    /* ── Reset & base ────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-primary:   #0d1117;
      --bg-secondary: #161b22;
      --bg-tertiary:  #21262d;
      --bg-hover:     #30363d;
      --border:       #30363d;
      --text-primary: #e6edf3;
      --text-muted:   #8b949e;
      --text-link:    #58a6ff;
      --accent:       #238636;
      --accent-hover: #2ea043;
      --danger:       #f85149;
      --warn:         #d29922;
      --warn-bg:      #272115;
      --user-bubble:  #1f6feb;
      --ai-bubble:    #21262d;
      --code-bg:      #161b22;
      --radius:       8px;
      --sidebar-w:    240px;
    }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      background: var(--bg-primary);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar ─────────────────────────────────────────────────── */
    #topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 10;
    }
    #topbar h1 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      flex: 1;
    }
    #status-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #444;
      flex-shrink: 0;
      transition: background 0.3s;
    }
    #status-dot.connected    { background: #3fb950; }
    #status-dot.disconnected { background: var(--danger); }
    #status-label { font-size: 12px; color: var(--text-muted); }

    #settings-btn {
      background: none; border: 1px solid var(--border);
      color: var(--text-muted); border-radius: var(--radius);
      padding: 4px 10px; cursor: pointer; font-size: 12px;
    }
    #settings-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

    /* ── Execute warning banner ──────────────────────────────────── */
    #exec-banner {
      display: none;
      background: var(--warn-bg);
      border-bottom: 1px solid var(--warn);
      color: var(--warn);
      padding: 6px 16px;
      font-size: 12px;
      font-weight: 600;
      text-align: center;
      flex-shrink: 0;
    }
    #exec-banner.visible { display: block; }

    /* ── Main layout ─────────────────────────────────────────────── */
    #main {
      display: flex;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────────────────────── */
    #sidebar {
      width: var(--sidebar-w);
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow-y: auto;
      padding: 12px 0;
    }
    .sidebar-section { padding: 0 12px 12px; }
    .sidebar-section h3 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .cluster-stat {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
      font-size: 12px;
      border-bottom: 1px solid var(--border);
    }
    .cluster-stat:last-child { border-bottom: none; }
    .stat-label { color: var(--text-muted); }
    .stat-val { font-weight: 600; color: var(--text-primary); }
    .stat-val.ok { color: #3fb950; }
    .stat-val.warn { color: var(--warn); }
    .stat-val.err { color: var(--danger); }

    .tool-link {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border-radius: var(--radius);
      text-decoration: none;
      color: var(--text-primary);
      font-size: 12px;
      transition: background 0.15s;
    }
    .tool-link:hover { background: var(--bg-hover); }
    .tool-link .icon { font-size: 14px; width: 18px; text-align: center; }
    .tool-link .name { flex: 1; }
    .tool-link .ext { color: var(--text-muted); font-size: 10px; }

    #sidebar-loading {
      padding: 8px 12px;
      font-size: 11px;
      color: var(--text-muted);
      font-style: italic;
    }

    /* ── Chat area ───────────────────────────────────────────────── */
    #chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    /* ── Starter chips ───────────────────────────────────────────── */
    #starters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px 16px 0;
    }
    .starter-chip {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;
      color: var(--text-primary);
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .starter-chip:hover {
      background: var(--bg-hover);
      border-color: var(--text-link);
      color: var(--text-link);
    }

    /* ── Message bubbles ─────────────────────────────────────────── */
    .msg {
      display: flex;
      gap: 10px;
      max-width: 780px;
    }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.ai   { align-self: flex-start; }

    .avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      margin-top: 2px;
    }
    .msg.user .avatar { background: var(--user-bubble); }
    .msg.ai   .avatar { background: var(--accent); }

    .bubble {
      padding: 10px 13px;
      border-radius: var(--radius);
      max-width: 100%;
      word-break: break-word;
      line-height: 1.55;
    }
    .msg.user .bubble {
      background: var(--user-bubble);
      color: #fff;
      border-bottom-right-radius: 2px;
    }
    .msg.ai .bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 2px;
    }

    /* ── Bubble content: code, commands, details ─────────────────── */
    .bubble code {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: "SF Mono", "Fira Code", Consolas, monospace;
      font-size: 12px;
    }
    .bubble pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      overflow-x: auto;
      margin: 8px 0;
      font-family: "SF Mono", "Fira Code", Consolas, monospace;
      font-size: 12px;
      line-height: 1.5;
    }
    .bubble pre code { background: none; border: none; padding: 0; }

    .cmd-block {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius);
      padding: 8px 12px;
      margin: 6px 0;
      font-family: "SF Mono", "Fira Code", Consolas, monospace;
      font-size: 12px;
      color: #79c0ff;
    }

    .risk-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      border-radius: 4px;
      padding: 1px 6px;
      margin-left: 6px;
      vertical-align: middle;
    }
    .risk-low    { background: #1a3a1a; color: #3fb950; border: 1px solid #3fb950; }
    .risk-medium { background: #272115; color: var(--warn); border: 1px solid var(--warn); }
    .risk-high   { background: #3d0f0f; color: var(--danger); border: 1px solid var(--danger); }

    .bubble details {
      margin-top: 8px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .bubble details summary {
      padding: 6px 10px;
      cursor: pointer;
      font-size: 12px;
      color: var(--text-muted);
      user-select: none;
    }
    .bubble details summary:hover { color: var(--text-primary); }
    .bubble details[open] summary { border-bottom: 1px solid var(--border); }
    .bubble details .result-content {
      padding: 8px 10px;
      font-family: "SF Mono", "Fira Code", Consolas, monospace;
      font-size: 11px;
      white-space: pre-wrap;
      color: var(--text-muted);
      max-height: 240px;
      overflow-y: auto;
    }

    .pr-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 8px;
      color: var(--text-link);
      text-decoration: none;
      font-size: 13px;
    }
    .pr-link:hover { text-decoration: underline; }

    /* ── Thinking / spinner ──────────────────────────────────────── */
    .thinking .bubble {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 10px 16px;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* ── Input area ──────────────────────────────────────────────── */
    #input-area {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 10px 16px 12px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    #msg-input {
      flex: 1;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-primary);
      font-size: 14px;
      padding: 9px 12px;
      resize: none;
      min-height: 40px;
      max-height: 140px;
      overflow-y: auto;
      outline: none;
      font-family: inherit;
      line-height: 1.5;
      transition: border-color 0.15s;
    }
    #msg-input:focus { border-color: var(--text-link); }
    #msg-input::placeholder { color: var(--text-muted); }

    .input-btn {
      flex-shrink: 0;
      height: 40px;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: background 0.15s, opacity 0.15s;
    }
    #send-btn {
      padding: 0 16px;
      background: var(--accent);
      color: #fff;
    }
    #send-btn:hover { background: var(--accent-hover); }
    #send-btn:disabled { opacity: 0.45; cursor: default; }

    /* Execute toggle */
    #exec-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    #exec-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      white-space: nowrap;
    }
    #exec-toggle {
      position: relative;
      width: 38px; height: 22px;
      flex-shrink: 0;
    }
    #exec-toggle input { opacity: 0; width: 0; height: 0; }
    #exec-slider {
      position: absolute; inset: 0;
      background: var(--bg-hover);
      border: 1px solid var(--border);
      border-radius: 11px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #exec-slider::before {
      content: "";
      position: absolute;
      width: 16px; height: 16px;
      left: 2px; top: 2px;
      background: var(--text-muted);
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }
    #exec-toggle input:checked + #exec-slider { background: #3d0f0f; border-color: var(--danger); }
    #exec-toggle input:checked + #exec-slider::before { transform: translateX(16px); background: var(--danger); }

    /* ── Config / Settings modal ─────────────────────────────────── */
    #modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #modal-overlay.visible { display: flex; }
    #modal {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px;
      width: 380px;
      max-width: 92vw;
    }
    #modal h2 { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 5px; }
    .field input {
      width: 100%;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-primary);
      font-size: 13px;
      padding: 8px 10px;
      outline: none;
      font-family: "SF Mono", Consolas, monospace;
    }
    .field input:focus { border-color: var(--text-link); }
    .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
    .btn-primary {
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius);
      padding: 7px 16px; font-size: 13px; font-weight: 600;
      cursor: pointer;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary {
      background: none; color: var(--text-muted);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 7px 14px; font-size: 13px; cursor: pointer;
    }
    .btn-secondary:hover { background: var(--bg-hover); color: var(--text-primary); }

    /* ── Mobile ──────────────────────────────────────────────────── */
    @media (max-width: 640px) {
      #sidebar { display: none; }
      #starters { gap: 6px; padding: 8px 12px 0; }
      .starter-chip { font-size: 11px; padding: 4px 10px; }
      #exec-label { display: none; }
      #exec-toggle { width: 46px; height: 26px; }
      #exec-slider::before { width: 20px; height: 20px; }
      #exec-toggle input:checked + #exec-slider::before { transform: translateX(19px); }
    }
  </style>
</head>
<body>

<!-- ── Top bar ─────────────────────────────────────────────────────────── -->
<div id="topbar">
  <div id="status-dot" title="Checking connection..."></div>
  <h1>DevOps Platform Assistant</h1>
  <span id="status-label">Connecting...</span>
  <button id="settings-btn" onclick="openModal()">⚙ Server</button>
</div>

<!-- ── Execute warning banner ──────────────────────────────────────────── -->
<div id="exec-banner">⚡ Execute mode ON — kubectl commands and Terraform PRs will run live</div>

<!-- ── Main layout ─────────────────────────────────────────────────────── -->
<div id="main">

  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-section">
      <h3>Cluster Health</h3>
      <div id="cluster-stats">
        <div id="sidebar-loading">Loading...</div>
      </div>
    </div>

    <div class="sidebar-section">
      <h3>Quick Links</h3>
      <a class="tool-link" id="link-argocd" href="#" target="_blank">
        <span class="icon">🔄</span><span class="name">ArgoCD</span><span class="ext">↗</span>
      </a>
      <a class="tool-link" id="link-jenkins" href="#" target="_blank">
        <span class="icon">🏗️</span><span class="name">Jenkins</span><span class="ext">↗</span>
      </a>
      <a class="tool-link" id="link-sonarqube" href="#" target="_blank">
        <span class="icon">🔍</span><span class="name">SonarQube</span><span class="ext">↗</span>
      </a>
      <a class="tool-link" id="link-harbor" href="#" target="_blank">
        <span class="icon">🚢</span><span class="name">Harbor</span><span class="ext">↗</span>
      </a>
    </div>
  </div>

  <!-- Chat area -->
  <div id="chat-area">

    <!-- Starter chips -->
    <div id="starters">
      <button class="starter-chip" onclick="sendMessage('Is my cluster healthy?')">Is my cluster healthy?</button>
      <button class="starter-chip" onclick="sendMessage('Show all running pods')">Show all running pods</button>
      <button class="starter-chip" onclick="sendMessage('Scale Jenkins to 2 replicas')">Scale Jenkins to 2 replicas</button>
      <button class="starter-chip" onclick="sendMessage('Get SonarQube logs')">Get SonarQube logs</button>
      <button class="starter-chip" onclick="sendMessage('Restart Harbor registry')">Restart Harbor registry</button>
      <button class="starter-chip" onclick="sendMessage('What\\'s using the most memory?')">What's using the most memory?</button>
    </div>

    <!-- Messages -->
    <div id="messages"></div>

    <!-- Input -->
    <div id="input-area">
      <textarea id="msg-input" rows="1" placeholder="Ask anything about your infra... (Enter to send, Shift+Enter for newline)"></textarea>
      <div id="exec-wrap">
        <label id="exec-toggle">
          <input type="checkbox" id="exec-checkbox" />
          <span id="exec-slider"></span>
        </label>
        <span id="exec-label">Execute</span>
      </div>
      <button id="send-btn" class="input-btn" onclick="submitMessage()">Send</button>
    </div>

  </div>
</div>

<!-- ── Config modal ─────────────────────────────────────────────────────── -->
<div id="modal-overlay">
  <div id="modal">
    <h2>Connect to Prompt Engine</h2>
    <div class="field">
      <label>Server URL</label>
      <input type="text" id="server-url-input" placeholder="http://localhost:8000" />
    </div>
    <p style="font-size:11px;color:var(--text-muted);margin-top:-6px;">
      Start the server: <code style="font-size:11px;">uvicorn prompt_engine.server:app --reload --port 8000</code>
    </p>
    <div class="modal-btns">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveAndConnect()">Connect</button>
    </div>
  </div>
</div>

<script>
// ── Config ───────────────────────────────────────────────────────────────────
const LS_KEY_URL  = "infra_engine_url";
const LS_KEY_ARGOCD    = "tool_argocd_url";
const LS_KEY_JENKINS   = "tool_jenkins_url";
const LS_KEY_SONARQUBE = "tool_sonarqube_url";
const LS_KEY_HARBOR    = "tool_harbor_url";

let ENGINE_URL = localStorage.getItem(LS_KEY_URL) || "http://localhost:8000";

// Tool URLs — can be overridden by user or detected from server
const TOOL_URLS = {
  argocd:    localStorage.getItem(LS_KEY_ARGOCD)    || "http://a944fe58b20d24057b8cf0af7f586c3a-245014201.us-east-1.elb.amazonaws.com",
  jenkins:   localStorage.getItem(LS_KEY_JENKINS)   || "http://a910314d11cee49a99b923e221108e05-468852420.us-east-1.elb.amazonaws.com:8080",
  sonarqube: localStorage.getItem(LS_KEY_SONARQUBE) || "http://a386f7224766d43d6b50aeee825abe34-1292105297.us-east-1.elb.amazonaws.com:9000",
  harbor:    localStorage.getItem(LS_KEY_HARBOR)    || "http://a68756541aa5a454d81e6515e061e3c2-574233704.us-east-1.elb.amazonaws.com",
};

// ── State ────────────────────────────────────────────────────────────────────
let connected = false;
let isFirstLoad = true;

// ── DOM refs ─────────────────────────────────────────────────────────────────
const messagesEl   = document.getElementById("messages");
const inputEl      = document.getElementById("msg-input");
const sendBtn      = document.getElementById("send-btn");
const execCheckbox = document.getElementById("exec-checkbox");
const execBanner   = document.getElementById("exec-banner");
const statusDot    = document.getElementById("status-dot");
const statusLabel  = document.getElementById("status-label");
const startersEl   = document.getElementById("starters");

// ── Init ─────────────────────────────────────────────────────────────────────
window.addEventListener("DOMContentLoaded", () => {
  setToolLinks();

  // Show config modal on first visit
  if (!localStorage.getItem(LS_KEY_URL)) {
    openModal();
  } else {
    initConnection();
  }

  // Execute toggle
  execCheckbox.addEventListener("change", () => {
    execBanner.classList.toggle("visible", execCheckbox.checked);
  });

  // Auto-resize textarea
  inputEl.addEventListener("input", autoResize);
  inputEl.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      submitMessage();
    }
  });
});

function setToolLinks() {
  document.getElementById("link-argocd").href    = TOOL_URLS.argocd;
  document.getElementById("link-jenkins").href   = TOOL_URLS.jenkins;
  document.getElementById("link-sonarqube").href = TOOL_URLS.sonarqube;
  document.getElementById("link-harbor").href    = TOOL_URLS.harbor;
}

function autoResize() {
  inputEl.style.height = "auto";
  inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + "px";
}

// ── Connection ───────────────────────────────────────────────────────────────
async function initConnection() {
  try {
    const res = await fetch(`${ENGINE_URL}/health`, { signal: AbortSignal.timeout(5000) });
    if (res.ok) {
      setConnected(true);
      if (isFirstLoad) {
        isFirstLoad = false;
        loadSidebarStatus();
      }
    } else {
      setConnected(false);
    }
  } catch {
    setConnected(false);
    if (isFirstLoad) {
      isFirstLoad = false;
      openModal();
    }
  }
}

function setConnected(ok) {
  connected = ok;
  statusDot.className = ok ? "connected" : "disconnected";
  statusLabel.textContent = ok ? "Connected" : "Offline";
}

// ── Sidebar status ───────────────────────────────────────────────────────────
async function loadSidebarStatus() {
  const statsEl = document.getElementById("cluster-stats");
  try {
    const res = await fetch(`${ENGINE_URL}/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: "cluster status summary", execute: false }),
      signal: AbortSignal.timeout(30000),
    });
    if (!res.ok) throw new Error("non-ok");
    const data = await res.json();

    // Parse quick stats from reply text — look for numbers
    const podMatch  = data.reply.match(/(\d+)\s+pod/i);
    const nodeMatch = data.reply.match(/(\d+)\s+node/i);
    const nsMatch   = data.reply.match(/(\d+)\s+namespace/i);
    const healthy   = /healthy|ok|running|good/i.test(data.reply);
    const warn      = /warn|issue|error|fail|not ready/i.test(data.reply);

    statsEl.innerHTML = `
      <div class="cluster-stat">
        <span class="stat-label">Status</span>
        <span class="stat-val ${warn ? 'warn' : 'ok'}">${warn ? 'Warning' : 'Healthy'}</span>
      </div>
      ${podMatch ? `<div class="cluster-stat"><span class="stat-label">Pods</span><span class="stat-val">${podMatch[1]}</span></div>` : ''}
      ${nodeMatch ? `<div class="cluster-stat"><span class="stat-label">Nodes</span><span class="stat-val">${nodeMatch[1]}</span></div>` : ''}
      ${nsMatch ? `<div class="cluster-stat"><span class="stat-label">Namespaces</span><span class="stat-val">${nsMatch[1]}</span></div>` : ''}
    `;
  } catch {
    statsEl.innerHTML = '<div style="font-size:11px;color:var(--text-muted);padding:4px 0;">Could not load cluster status</div>';
  }
}

// ── Modal ────────────────────────────────────────────────────────────────────
function openModal() {
  document.getElementById("server-url-input").value = ENGINE_URL;
  document.getElementById("modal-overlay").classList.add("visible");
}
function closeModal() {
  document.getElementById("modal-overlay").classList.remove("visible");
}
async function saveAndConnect() {
  const val = document.getElementById("server-url-input").value.trim().replace(/\/$/, "");
  if (!val) return;
  ENGINE_URL = val;
  localStorage.setItem(LS_KEY_URL, val);
  closeModal();
  await initConnection();
  if (connected && isFirstLoad) {
    isFirstLoad = false;
    loadSidebarStatus();
  }
}

// ── Send message ─────────────────────────────────────────────────────────────
async function sendMessage(text) {
  if (!text.trim()) return;
  startersEl.style.display = "none";
  inputEl.value = "";
  autoResize();
  appendUserMsg(text);
  const thinkingId = appendThinking();
  sendBtn.disabled = true;

  const execute = execCheckbox.checked;

  try {
    const res = await fetch(`${ENGINE_URL}/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text, execute }),
      signal: AbortSignal.timeout(60000),
    });

    removeThinking(thinkingId);

    if (!res.ok) {
      const err = await res.json().catch(() => ({ detail: res.statusText }));
      appendAIMsg(`Error ${res.status}: ${err.detail || res.statusText}`, null);
    } else {
      const data = await res.json();
      appendAIMsg(data.reply, data);
      // Refresh sidebar after each response
      loadSidebarStatus();
    }
  } catch (e) {
    removeThinking(thinkingId);
    if (e.name === "TimeoutError") {
      appendAIMsg("Request timed out after 60 seconds. The server may be busy or unreachable.", null);
    } else {
      appendAIMsg(`Connection error: ${e.message}. Is the server running at ${ENGINE_URL}?`, null);
      setConnected(false);
    }
  }

  sendBtn.disabled = false;
  scrollToBottom();
}

function submitMessage() {
  const text = inputEl.value.trim();
  if (text) sendMessage(text);
}

// ── Message rendering ────────────────────────────────────────────────────────
function appendUserMsg(text) {
  const div = document.createElement("div");
  div.className = "msg user";
  div.innerHTML = `
    <div class="avatar">👤</div>
    <div class="bubble">${escHtml(text)}</div>
  `;
  messagesEl.appendChild(div);
  scrollToBottom();
}

function appendThinking() {
  const id = "thinking-" + Date.now();
  const div = document.createElement("div");
  div.className = "msg ai thinking";
  div.id = id;
  div.innerHTML = `
    <div class="avatar">🤖</div>
    <div class="bubble">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
  `;
  messagesEl.appendChild(div);
  scrollToBottom();
  return id;
}

function removeThinking(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

function appendAIMsg(replyText, data) {
  const div = document.createElement("div");
  div.className = "msg ai";

  let html = `<div class="avatar">🤖</div><div class="bubble">`;

  // Main reply — render markdown-like formatting
  html += formatReply(replyText);

  if (data) {
    // Commands
    if (data.commands && data.commands.length > 0) {
      html += `<div style="margin-top:10px;font-size:12px;color:var(--text-muted);margin-bottom:4px;">
        Commands${data.risk ? ` <span class="risk-badge risk-${data.risk}">${data.risk}</span>` : ''}:
      </div>`;
      data.commands.forEach(cmd => {
        html += `<div class="cmd-block">$ ${escHtml(cmd)}</div>`;
      });
    }

    // PR link
    if (data.pr_url) {
      html += `<a class="pr-link" href="${escHtml(data.pr_url)}" target="_blank">
        🔗 View GitHub PR
      </a>`;
    }

    // Files generated
    if (data.files_generated && data.files_generated.length > 0) {
      html += `<div style="margin-top:8px;font-size:11px;color:var(--text-muted);">
        Files: ${data.files_generated.map(f => `<code>${escHtml(f)}</code>`).join(", ")}
      </div>`;
    }

    // Execution results
    if (data.results && data.results.length > 0) {
      data.results.forEach(r => {
        const label = r.command ? `$ ${r.command}` : "Result";
        const out = (r.stdout || "") + (r.stderr ? `\n[stderr] ${r.stderr}` : "");
        html += `<details style="margin-top:8px;">
          <summary>${escHtml(label.slice(0, 80))}${label.length > 80 ? '…' : ''}</summary>
          <div class="result-content">${escHtml(out || "(no output)")}</div>
        </details>`;
      });
    }

    // Executed indicator
    if (data.executed) {
      html += `<div style="margin-top:8px;font-size:11px;color:var(--text-muted);">✓ Executed live</div>`;
    }
  }

  html += `</div>`;
  div.innerHTML = html;
  messagesEl.appendChild(div);
  scrollToBottom();
}

// Basic markdown-to-HTML: code blocks, inline code, bold
function formatReply(text) {
  if (!text) return "";
  let out = escHtml(text);
  // Fenced code blocks
  out = out.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
    `<pre><code>${code.trim()}</code></pre>`
  );
  // Inline code
  out = out.replace(/`([^`\n]+)`/g, "<code>$1</code>");
  // Bold
  out = out.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  // Newlines → <br>
  out = out.replace(/\n/g, "<br>");
  return out;
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function scrollToBottom() {
  requestAnimationFrame(() => {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  });
}

// Click outside modal to close
document.getElementById("modal-overlay").addEventListener("click", e => {
  if (e.target === document.getElementById("modal-overlay")) closeModal();
});
</script>
